name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test

  clippy:
    name: Clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: WASM (pure-Rust crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build pure-Rust crates for WASM
        run: >
          cargo build --target wasm32-unknown-unknown
          -p splica-core
          -p splica-mp4
          -p splica-webm
          -p splica-filter
          -p splica-pipeline
      - name: Build splica-codec for WASM (traits only, no FFI)
        run: cargo build --target wasm32-unknown-unknown -p splica-codec --no-default-features
      - name: Build splica-mp4 WASM with bindings (release)
        run: cargo build --target wasm32-unknown-unknown -p splica-mp4 --features wasm --release
      - name: Report WASM bundle size
        id: wasm_size
        run: |
          WASM_SIZE=$(stat -c%s target/wasm32-unknown-unknown/release/splica_mp4.wasm)
          WASM_SIZE_KB=$((WASM_SIZE / 1024))
          echo "splica_mp4_wasm_bytes=$WASM_SIZE" >> "$GITHUB_OUTPUT"
          echo "### WASM Bundle Size" >> "$GITHUB_STEP_SUMMARY"
          echo "| Crate | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| splica-mp4 (release) | ${WASM_SIZE_KB} KB (${WASM_SIZE} bytes) |" >> "$GITHUB_STEP_SUMMARY"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
