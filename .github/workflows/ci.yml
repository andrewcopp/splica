name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native codec dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            clang libclang-dev \
            libde265-dev \
            libdav1d-dev \
            pkg-config cmake \
            autotools-dev automake libtool
      - name: Build and install kvazaar from source
        run: |
          git clone --depth 1 --branch v2.3.1 https://github.com/ultravideo/kvazaar.git /tmp/kvazaar
          cd /tmp/kvazaar
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --all-targets
      - run: cargo test

  clippy:
    name: Clippy (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install native codec dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            clang libclang-dev \
            libde265-dev \
            libdav1d-dev \
            pkg-config cmake \
            autotools-dev automake libtool
      - name: Build and install kvazaar from source
        run: |
          git clone --depth 1 --branch v2.3.1 https://github.com/ultravideo/kvazaar.git /tmp/kvazaar
          cd /tmp/kvazaar
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  wasm:
    name: WASM (pure-Rust crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build pure-Rust crates for WASM
        run: >
          cargo build --target wasm32-unknown-unknown
          -p splica-core
          -p splica-mp4
          -p splica-webm
          -p splica-filter
          -p splica-pipeline
      - name: Build splica-codec for WASM (traits only, no FFI)
        run: cargo build --target wasm32-unknown-unknown -p splica-codec --no-default-features
      - name: Build splica-wasm (unified bindings, release)
        run: cargo build --target wasm32-unknown-unknown -p splica-wasm --release
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build splica-wasm with wasm-pack (demux-only, default)
        run: wasm-pack build --target web crates/splica-wasm --release
      - name: Verify wasm-pack output
        run: |
          test -f crates/splica-wasm/pkg/splica_wasm_bg.wasm
          test -f crates/splica-wasm/pkg/splica_wasm.js
          test -f crates/splica-wasm/pkg/splica_wasm.d.ts
          echo "wasm-pack output verified: .wasm, .js, .d.ts files present"
      - name: Record demux-only bundle size
        id: wasm_demux_only
        run: |
          WASM_SIZE=$(stat -c%s crates/splica-wasm/pkg/splica_wasm_bg.wasm)
          echo "size=$WASM_SIZE" >> "$GITHUB_OUTPUT"
          echo "size_kb=$((WASM_SIZE / 1024))" >> "$GITHUB_OUTPUT"
      - name: Build splica-wasm with wasm-pack (encode-av1)
        run: wasm-pack build --target web crates/splica-wasm --release -- --features encode-av1
      - name: Record encode-av1 bundle size
        id: wasm_encode_av1
        run: |
          WASM_SIZE=$(stat -c%s crates/splica-wasm/pkg/splica_wasm_bg.wasm)
          echo "size=$WASM_SIZE" >> "$GITHUB_OUTPUT"
          echo "size_kb=$((WASM_SIZE / 1024))" >> "$GITHUB_OUTPUT"
      - name: Report WASM bundle sizes
        run: |
          echo "### WASM Bundle Sizes by Feature Set" >> "$GITHUB_STEP_SUMMARY"
          echo "| Configuration | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| demux-only (default) | ${{ steps.wasm_demux_only.outputs.size_kb }} KB |" >> "$GITHUB_STEP_SUMMARY"
          echo "| encode-av1 | ${{ steps.wasm_encode_av1.outputs.size_kb }} KB |" >> "$GITHUB_STEP_SUMMARY"
      - name: Verify encode-av1 is larger than demux-only
        run: |
          DEMUX=${{ steps.wasm_demux_only.outputs.size }}
          AV1=${{ steps.wasm_encode_av1.outputs.size }}
          if [ "$AV1" -le "$DEMUX" ]; then
            echo "ERROR: encode-av1 ($AV1 bytes) should be larger than demux-only ($DEMUX bytes)"
            exit 1
          fi
          echo "OK: demux-only=${DEMUX} bytes, encode-av1=${AV1} bytes (delta: $((AV1 - DEMUX)) bytes)"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check
